formula     = "mol-architecture"
description = """
ADR design and review pipeline.

After cooking, sling the design step to an architect:
```bash
gc sling architect <design-bead-id>
```
In scaled mode: `gc sling architect-1 <bead-id>`

The architect coordinates with its paired reviewer via mail."""
version     = 3

[vars.feature]
description = "Feature or epic description to design an ADR for"

[[steps]]
id          = "design"
title       = "Design ADR: {{feature}}"
description = """
Write an Architecture Decision Record for: {{feature}}.

Follow the ADR template in your system prompt. Place the ADR in `docs/adr/`.
When complete, send to your paired reviewer for feedback.
Iterate up to 3 rounds. When approved, notify the mayor."""

[[steps]]
id          = "review"
title       = "Review ADR: {{feature}}"
needs       = ["design"]
description = """
Review the ADR for: {{feature}}.

Evaluate completeness, feasibility, parallelism, file ownership, interfaces,
testing strategy, and risk. Send structured feedback to your paired architect.
When no blocking feedback remains, explicitly approve."""

[[steps]]
id          = "approval"
title       = "Human approval: {{feature}} ADR"
needs       = ["review"]
description = """
The architect and reviewer have converged on the ADR for: {{feature}}.
The human reviews and approves. The mayor closes this bead after approval."""
