formula     = "mol-dev-pipeline"
description = """
ADR-driven development pipeline.

After cooking, sling the plan step to a planner:
```bash
gc sling planner <plan-bead-id>
```
In scaled mode: `gc sling planner-1 <bead-id>`

The planner dispatches to the dog pool. QE, security, and senior review run in parallel."""
version     = 4

[vars.feature]
description = "Short feature name for task titles"

[vars.adr]
description = "Path to the approved ADR document"

[[steps]]
id          = "plan"
title       = "Plan work: {{feature}}"
description = """
Read the approved ADR at {{adr}}. Break the work into parallel tasks with
explicit file ownership boundaries. Create and dispatch each task to the
dog pool from `/workspace`:
```bash
cd /workspace
gc bd create "Implement <component>: {{feature}}"
gc sling dog <bead-id>
```"""

[[steps]]
id          = "develop"
title       = "Implement: {{feature}}"
needs       = ["plan"]
description = """
Development work dispatched by the planner. Dog pool agents implement
their assigned tasks. Complete when all sub-task beads are closed."""

[[steps]]
id          = "qe-validate"
title       = "QE validation: {{feature}}"
needs       = ["develop"]
description = """
Validate test coverage and ensure all tests pass for: {{feature}}.
Run the test suite, assess coverage, write missing tests, report findings."""

[[steps]]
id          = "security-review"
title       = "Security review: {{feature}}"
needs       = ["develop"]
description = """
Perform an ASVS v5.0.0 security review on the changes for: {{feature}}.
Provide a structured report of vulnerabilities and remediation steps."""

[[steps]]
id          = "senior-review"
title       = "Senior review: {{feature}}"
needs       = ["develop"]
description = """
Review code quality, architecture adherence, and production readiness
for: {{feature}}. Provide structured feedback with file:line references."""

[[steps]]
id          = "fix-cycle"
title       = "Fix cycle: {{feature}}"
needs       = ["qe-validate", "senior-review", "security-review"]
description = """
Address feedback from QE, security, and senior review. Create targeted fix-beads
from `/workspace` and dispatch to dogs. If no fixes needed, close immediately."""

[[steps]]
id          = "final-check"
title       = "Final ADR verification: {{feature}}"
needs       = ["fix-cycle"]
description = """
Re-read the ADR at {{adr}} and verify every requirement is implemented.
If complete, close the molecule. If gaps remain, create fix-beads."""
